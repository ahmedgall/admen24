<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم روشان | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --dark: #1a1a1a; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; color: var(--dark); }
        
        .admin-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: var(--dark); color: white; padding: 30px 20px; position: fixed; height: 100%; right: 0; }
        .sidebar h2 { color: var(--primary); text-align: center; border-bottom: 2px solid #333; padding-bottom: 15px; }
        .nav-item { padding: 15px; cursor: pointer; transition: 0.3s; border-radius: 8px; margin-bottom: 5px; }
        .nav-item:hover { background: #333; color: var(--primary); }

        /* Main Content */
        .main-content { flex: 1; margin-right: 280px; padding: 40px; }
        .header { background: white; padding: 20px 30px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        
        #connection-status { font-weight: 700; font-size: 0.9rem; }

        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; }
        .full { grid-column: span 2; }
        .section-title { grid-column: span 2; color: var(--primary); border-right: 4px solid var(--primary); padding-right: 10px; margin-top: 10px; font-weight: 700; }
        
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; }
        input:focus { border-color: var(--primary); outline: none; }

        .btn-save { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 1.1rem; width: 100%; transition: 0.3s; margin-top: 20px; position: sticky; bottom: 20px; z-index: 100; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .btn-save:hover { background: #b8962d; transform: translateY(-2px); }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .main-content { margin-right: 0; }
            .grid { grid-template-columns: 1fr; }
            .full { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <aside class="sidebar">
        <h2>Fixaa Arab ⚓</h2>
        <div class="nav-item">📊 نظرة عامة</div>
        <div class="nav-item">✏️ تعديل المحتوى</div>
        <div class="nav-item">📞 الإعدادات</div>
    </aside>

    <main class="main-content">
        <div class="header">
            <div>
                <h1 style="margin:0; font-size: 1.4rem;">لوحة تحكم موقع روشان</h1>
                <small>أهلاً ، التعديلات تظهر فوراً للعملاء</small>
            </div>
            <div id="connection-status">جاري الفحص...</div>
        </div>

        <div class="card">
            <div class="grid">
                <div class="section-title">قسم المقدمة (Hero Section)</div>
                <div class="form-group full">
                    <label>العنوان الرئيسي (Hero Title)</label>
                    <input type="text" id="mainTitle">
                </div>
                <div class="form-group">
                    <label>العنوان الفرعي</label>
                    <input type="text" id="subtitle">
                </div>
                <div class="form-group">
                    <label>رقم الواتساب (مثال: 966568606854)</label>
                    <input type="text" id="waNum">
                </div>
                <div class="form-group full">
                    <label>وصف المقدمة (Hero Description)</label>
                    <textarea id="heroDesc" rows="2"></textarea>
                </div>

                <div class="section-title">قسم التنظيف بالساعة</div>
                <div class="form-group">
                    <label>عنوان قسم التنظيف</label>
                    <input type="text" id="cleanH">
                </div>
                <div class="form-group">
                    <label>رابط صورة التنظيف</label>
                    <input type="text" id="imgClean">
                </div>
                <div class="form-group full">
                    <label>وصف قسم التنظيف</label>
                    <textarea id="cleanP" rows="2"></textarea>
                </div>

                <div class="section-title">قسم الضيافه</div>
                <div class="form-group">
                    <label>عنوان الضيافه</label>
                    <input type="text" id="bathH">
                </div>
                <div class="form-group">
                    <label>رابط صورة االضيافه</label>
                    <input type="text" id="imgBath">
                </div>
                <div class="form-group full">
                    <label>وصف الضيافه</label>
                    <textarea id="bathP" rows="2"></textarea>
                </div>

                <div class="section-title">قسم المساج والاسترخاء</div>
                <div class="form-group">
                    <label>عنوان قسم المساج</label>
                    <input type="text" id="msgH">
                </div>
                <div class="form-group">
                    <label>رابط صورة المساج</label>
                    <input type="text" id="imgMsg">
                </div>
                <div class="form-group full">
                    <label>وصف قسم المساج</label>
                    <textarea id="msgP" rows="2"></textarea>
                </div>
            </div>

            <button class="btn-save" id="saveBtn" onclick="saveData()">حفظ ونشر التعديلات الآن 🚀</button>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // إعدادات فايربيس (تأكد من الـ apiKey والـ appId)
    const firebaseConfig = {
        apiKey: "AIza...", // ضع مفتاحك هنا
        authDomain: "vexa-4b2fb.firebaseapp.com",
        databaseURL: "https://vexa-4b2fb-default-rtdb.firebaseio.com",
        projectId: "vexa-4b2fb",
        storageBucket: "vexa-4b2fb.appspot.com",
        appId: "1:..." // ضع المعرف هنا
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const statusDiv = document.getElementById('connection-status');

    // جلب البيانات الحالية
    db.ref('content').on('value', (snap) => {
        const val = snap.val();
        if(val) {
            document.getElementById('mainTitle').value = val.mainTitle || "";
            document.getElementById('subtitle').value = val.subtitle || "";
            document.getElementById('heroDesc').value = val.heroDesc || "";
            document.getElementById('waNum').value = val.waNum || "";
            
            document.getElementById('cleanH').value = val.cleanH || "";
            document.getElementById('cleanP').value = val.cleanP || "";
            document.getElementById('imgClean').value = val.imgClean || "";

            // جلب بيانات الحمام المغربي الجديد
            document.getElementById('bathH').value = val.bathH || "";
            document.getElementById('bathP').value = val.bathP || "";
            document.getElementById('imgBath').value = val.imgBath || "";
            
            document.getElementById('msgH').value = val.msgH || "";
            document.getElementById('msgP').value = val.msgP || "";
            document.getElementById('imgMsg').value = val.imgMsg || "";
            
            statusDiv.innerText = "● متصل وقارئ للداتا";
            statusDiv.style.color = "#28a745";
        }
    }, (err) => {
        statusDiv.innerText = "● خطأ في الاتصال (Rules?)";
        statusDiv.style.color = "#dc3545";
    });

    // حفظ البيانات
    function saveData() {
        const btn = document.getElementById('saveBtn');
        btn.innerText = "جاري الحفظ...";
        
        const data = {
            mainTitle: document.getElementById('mainTitle').value,
            subtitle: document.getElementById('subtitle').value,
            heroDesc: document.getElementById('heroDesc').value,
            waNum: document.getElementById('waNum').value,
            
            cleanH: document.getElementById('cleanH').value,
            cleanP: document.getElementById('cleanP').value,
            imgClean: document.getElementById('imgClean').value,

            // حفظ بيانات الحمام المغربي الجديد
            bathH: document.getElementById('bathH').value,
            bathP: document.getElementById('bathP').value,
            imgBath: document.getElementById('imgBath').value,
            
            msgH: document.getElementById('msgH').value,
            msgP: document.getElementById('msgP').value,
            imgMsg: document.getElementById('imgMsg').value
        };

        db.ref('content').set(data)
            .then(() => {
                alert('عاش يا أحمد! تم التحديث بنجاح ✅');
                btn.innerText = "حفظ ونشر التعديلات الآن 🚀";
            })
            .catch((err) => {
                alert('خطأ: ' + err.message);
                btn.innerText = "حفظ ونشر التعديلات الآن 🚀";
            });
    }
</script>

</body>
</html>
